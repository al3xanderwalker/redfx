name: release

# Publishes all workspace packages to npm when a GitHub Release is published, via OIDC trusted
# publishing — configure a trusted publisher (this repo + release.yml) on each @redfx/* package.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm -r publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true" # auth is OIDC (trusted publishing); no token needed
